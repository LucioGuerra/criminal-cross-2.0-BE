# Minimal default configuration

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/athlium-pg}
quarkus.datasource.username=${DB_USERNAME:root}
quarkus.datasource.password=${DB_PASSWORD:root}

# MongoDB
quarkus.mongodb.connection-string=${MONGO_URL:mongodb://root:root@localhost:27017/athlium-mongo?authSource=admin}
quarkus.mongodb.database=${MONGO_DB:athlium-mongo}

# Firebase (required by @ConfigProperty injections)
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:src/main/resources/athlium-credentials.json}
firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.web-api-key=${FIREBASE_WEB_API_KEY:}
firebase.mock.enabled=${FIREBASE_MOCK_ENABLED:true}

# Keep custom Firebase auth filter as primary auth flow
quarkus.http.auth.proactive=false

# Optional local auth bypass (off by default)
auth.dev-bypass.enabled=${AUTH_DEV_BYPASS_ENABLED:false}
auth.dev-bypass.firebase-uid=${AUTH_DEV_BYPASS_UID:dev-bypass-user}
auth.dev-bypass.email=${AUTH_DEV_BYPASS_EMAIL:dev-bypass@local}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://athlium-f7b0f.web.app}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:authorization,content-type,x-idempotency-key}
cors.max-age-seconds=${CORS_MAX_AGE_SECONDS:3600}
