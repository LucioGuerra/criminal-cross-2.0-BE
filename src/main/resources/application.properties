# ==========================
# PostgreSQL Datasource
# ==========================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/athlium-pg
quarkus.datasource.username=root
quarkus.datasource.password=root

# Hibernate ORM
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# (o 'drop-and-create' si querés limpiar todo cada vez)
# quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.hibernate-orm.schema-management.strategy=update

# Mostrar SQLs
quarkus.hibernate-orm.log.sql=true

# MongoDB
quarkus.mongodb.connection-string=mongodb://root:root@localhost:27017/athlium-mongo?authSource=admin
quarkus.mongodb.database=athlium-mongo

# Flyway
quarkus.flyway.migrate-at-start=false

# ==========================
# Firebase Configuration
# ==========================
# Path to Firebase service account credentials JSON file
# Set via environment variable: FIREBASE_CREDENTIALS_PATH
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:src/main/resources/athlium-credentials.json}

# Firebase project ID (optional, usually auto-detected from credentials)
firebase.project-id=${FIREBASE_PROJECT_ID:}

# Firebase Web API key used by Identity Toolkit REST endpoints
firebase.web-api-key=${FIREBASE_WEB_API_KEY:}

# Enable mock mode for development without Firebase credentials
# Set to true to use mock authentication (DO NOT USE IN PRODUCTION)
firebase.mock.enabled=${FIREBASE_MOCK_ENABLED:true}

# ==========================
# Auth Token Configuration
# ==========================
# We use a custom JAX-RS auth filter (FirebaseAuthFilter).
# Disable Quarkus proactive auth so bearer tokens are not pre-rejected by SmallRye JWT.
quarkus.http.auth.proactive=false

# Dev/test auth bypass for frontend integration
# true in dev/test by default, always false in production
auth.dev-bypass.enabled=${AUTH_DEV_BYPASS_ENABLED:false}
%dev.auth.dev-bypass.enabled=${AUTH_DEV_BYPASS_ENABLED:true}
%test.auth.dev-bypass.enabled=${AUTH_DEV_BYPASS_ENABLED:true}
%prod.auth.dev-bypass.enabled=false
auth.dev-bypass.firebase-uid=${AUTH_DEV_BYPASS_UID:dev-bypass-user}
auth.dev-bypass.email=${AUTH_DEV_BYPASS_EMAIL:dev-bypass@local}

# ==========================
# CORS Configuration (MVP)
# ==========================
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,PUT,POST,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,origin
quarkus.http.cors.access-control-allow-credentials=false

%test.quarkus.http.cors.enabled=true
%test.quarkus.http.cors.origins=*
%test.quarkus.http.cors.methods=GET,PUT,POST,PATCH,DELETE,OPTIONS,HEAD
%test.quarkus.http.cors.headers=*
%test.quarkus.http.cors.access-control-allow-credentials=false

# ==========================
# Test Profile Logging
# ==========================
# Keep global logs readable, with deep visibility for auth/JWT/security and HTTP flow
%test.quarkus.log.level=INFO
%test.quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}] (%t) %s%e%n

%test.quarkus.log.category."org.athlium".level=DEBUG
%test.quarkus.log.category."org.athlium.auth".level=DEBUG
%test.quarkus.log.category."org.athlium.auth.infrastructure.security".level=TRACE

%test.quarkus.log.category."io.quarkus.security".level=DEBUG
%test.quarkus.log.category."io.quarkus.vertx.http".level=DEBUG

%test.quarkus.http.access-log.enabled=true
%test.quarkus.http.access-log.pattern=%h %r %s %D

# ==========================
# Production Profile
# ==========================
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/athlium-pg}
%prod.quarkus.datasource.username=${DB_USERNAME:root}
%prod.quarkus.datasource.password=${DB_PASSWORD:root}
%prod.quarkus.hibernate-orm.schema-management.strategy=update
%prod.quarkus.flyway.enabled=false
%prod.quarkus.flyway.migrate-at-start=false

%prod.quarkus.mongodb.connection-string=${MONGO_URL:mongodb://root:root@localhost:27017/athlium-mongo?authSource=admin}
%prod.quarkus.mongodb.database=${MONGO_DB:athlium-mongo}

%prod.firebase.mock.enabled=false
%prod.firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH}
